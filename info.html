<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Sans+Condensed:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>All The Details</title>

<style>
/* ===== Base reset ===== */
html, body {
    margin: 0;
    padding: 0;
    background-color: #ffffff;
    font-family: 'Fira Sans Condensed','Arial Rounded MT Bold',Arial,sans-serif;
    font-size: 20px;
    line-height: 1.55;
    color: #000;
}
    
table {
  border-collapse: collapse; /* Merges adjacent borders into a single thin line */
  width: 100%;
  margin-top: 10px;
}

table, th, td {
  border: 1px solid black; /* Sets the thin 1px border */
}

th, td {
  padding: 8px;
  text-align: left;
}

/* ===== Page container ===== */
.page {
    max-width: 760px;
    margin: 0 auto;
    padding: clamp(1rem, 4vw, 2rem);
}

/* ===== Headings ===== */
h1 {
    margin: 0 0 1.25rem 0;
    font-size: clamp(1.6rem, 4vw, 2.2rem);
    font-weight: 600;
}

h2 {
    margin-top: 2rem;
    margin-bottom: 0;
    font-size: clamp(1.15rem, 3vw, 1.4rem);
    font-weight: 500;
}

/* ===== Text ===== */
p {
    margin-top: 0.25rem;
    margin-bottom: 1rem;
}

/* ===== Lists ===== */
ul {
    padding-left: 1.2rem;
    margin-top: 0.5rem;
    margin-bottom: 1rem;
    list-style-type: square;
}

li {
    margin-bottom: 0.5rem;
}

/* ===== Links ===== */
a {
    color: #000;
    text-decoration-thickness: 1px;
    text-underline-offset: 2px;
}

a:hover {
    text-decoration: underline;
}

/* ===== Notice block ===== */
.notice {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    padding: 1rem;
    margin: 1.5rem 0;
    background: #fafafa;
    border-left: 4px solid #ccc;
}

.notice-icon {
    font-size: 1.5rem;
    line-height: 1.2;
}

/* ===== Directions ===== */
.directions {
    margin-top: 1.25rem;
}

.directions .indent {
    margin-left: 1rem;
    line-height: 1.6;
}

/* ===== Images ===== */
.parking-map {
    display: block;
    max-width: 100%;
    height: auto;
    margin: 1.5rem auto;
    border-radius: 4px;
}

/* ===== Footer spacing ===== */
.footer {
    margin-bottom: 4rem;
}

/* ===== Mobile adjustments ===== */
@media (max-width: 600px) {
    body {
        font-size: 15px;
    }

    h2 {
        margin-top: 1.75rem;
    }

    .directions .indent {
        margin-left: 0.75rem;
    }

    a {
        display: inline-block;
        padding: 0.15rem 0;
    }
}

/* ===== Remove Chrome focus / tap highlights ===== */
html:focus,
html:focus-visible,
body:focus,
body:focus-visible {
    outline: none;
}

html, body {
    -webkit-tap-highlight-color: transparent;
}

/* Prevent selection flash on headings */
h1, h2 {
    user-select: none;
    -webkit-user-select: none;
}

p, a, strong, div, li {
    user-select: text;
    -webkit-user-select: text;
}
</style>
</head>

<body>

    <div class="page">

        <h1>Ferd Leimkuhler Memorial Celebration</h1>

        <h2>When</h2>
        <p>Friday, June 12, 2026, Noon to 3pm.</p>

        <h2>Where</h2>
        <p>The Brazilian Room in Tilden Park, on the eastern edge of Berkeley, California.</p>

        <h2>Replay</h2>
        <p>Watch the replay <a target="_blank" href="https://youtu.be/Tq6hBsqOOGs">here</a>.</p>
        
        <p class="footer">
  <br>
    <a href="index.html">&laquo; Back</a>
</p>
        
    </div>

</body>
</html>
